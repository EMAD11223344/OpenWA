name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main ]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # إعداد وتتبع ملفات الصور والملفات الثنائية لمنع رفض الرفع
          git lfs install
          git lfs track "*.png"
          git lfs track "*.psd"
          
          # تنفيذ عملية الرفع المعتادة
          git push --force https://token:$HF_TOKEN@huggingface.co/spaces/myarenaosx/openwa main
